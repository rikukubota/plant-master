<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 植物マスター — garage</title>
<style>
:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --border: #e2ddd6;
  --text: #1a1a18;
  --sub: #6b6b62;
  --green: #3d6b4f;
  --green-l: #e8f0eb;
  --green-m: #b5cfc0;
  --amber: #c8862a;
  --amber-l: #fdf3e3;
  --red: #c0392b;
  --red-l: #fdecea;
  --gold: #f0b429;
  --r: 14px;
  --shadow: 0 2px 16px rgba(0,0,0,0.09);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ヘッダー */
header {
  background: var(--green);
  color: white;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 15px; font-weight: 700; }
.streak-badge {
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 13px; font-weight: 700;
}

/* トップ画面 */
#screen-top { padding: 20px; }
.top-title { font-size: 26px; font-weight: 800; text-align: center; margin: 20px 0 4px; color: var(--green); }
.top-sub { text-align: center; color: var(--sub); font-size: 13px; margin-bottom: 28px; }

.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 10px; margin-bottom: 24px;
}
.stat-card {
  background: var(--surface); border-radius: var(--r);
  padding: 14px 10px; text-align: center;
  border: 1px solid var(--border); box-shadow: var(--shadow);
}
.stat-num { font-size: 26px; font-weight: 800; color: var(--green); }
.stat-label { font-size: 11px; color: var(--sub); margin-top: 2px; }

.record-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 15px; font-weight: 700;
  cursor: pointer; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: var(--shadow); transition: all 0.2s;
}
.record-btn:hover { border-color: var(--green-m); background: var(--green-l); color: var(--green); }

/* レベル選択 */
.level-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.level-card {
  background: var(--surface); border-radius: var(--r); border: 1.5px solid var(--border);
  padding: 16px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow);
}
.level-card:hover { border-color: var(--green-m); transform: translateY(-1px); }
.level-card.locked { opacity: 0.4; cursor: not-allowed; }
.level-card.current { border-color: var(--green); border-width: 2px; }
.level-icon { font-size: 28px; flex-shrink: 0; }
.level-info { flex: 1; }
.level-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.level-desc { font-size: 12px; color: var(--sub); }
.level-stars { font-size: 16px; }
.level-progress-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.level-progress { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.5s; }

/* ゲーム画面 */
#screen-game { display: none; padding: 0 0 30px; }
.game-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
.back-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0 4px; }
.game-title { font-size: 14px; font-weight: 700; flex: 1; }
.score-badge { background: var(--green-l); color: var(--green); border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 700; }
.game-progress { height: 5px; background: var(--border); }
.game-progress-fill { height: 100%; background: var(--green); transition: width 0.4s ease; }

/* 問題カード */
.question-wrap { padding: 16px 20px; }
.plant-photo { width: 100%; height: 240px; border-radius: var(--r); overflow: hidden; background: var(--green-l); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; position: relative; }
.plant-photo img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
.plant-photo .photo-placeholder { font-size: 60px; }
.question-label { font-size: 12px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.question-text { font-size: 18px; font-weight: 700; margin-bottom: 20px; line-height: 1.4; }
.plant-name-hint { font-size: 13px; color: var(--sub); margin-bottom: 16px; background: var(--green-l); padding: 8px 12px; border-radius: 8px; }

/* 選択肢 */
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface); font-size: 14px; color: var(--text); cursor: pointer; text-align: left; transition: all 0.15s; line-height: 1.4; }
.choice-btn:hover:not(:disabled) { border-color: var(--green-m); background: var(--green-l); }
.choice-btn.correct { border-color: var(--green); background: var(--green-l); color: var(--green); font-weight: 700; }
.choice-btn.wrong { border-color: var(--red); background: var(--red-l); color: var(--red); }
.choice-btn:disabled { cursor: default; }

/* フィードバック */
.feedback { display: none; margin-top: 16px; border-radius: var(--r); padding: 14px 16px; }
.feedback.correct { background: var(--green-l); border: 1px solid var(--green-m); }
.feedback.wrong { background: var(--amber-l); border: 1px solid #e6c87a; }
.feedback-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
.feedback.correct .feedback-title { color: var(--green); }
.feedback.wrong .feedback-title { color: var(--amber); }
.feedback-desc { font-size: 13px; color: var(--text); line-height: 1.6; }

.next-btn { width: 100%; margin-top: 14px; padding: 14px; border-radius: 12px; border: none; background: var(--green); color: white; font-size: 15px; font-weight: 700; cursor: pointer; display: none; }

/* 結果画面 */
#screen-result { display: none; padding: 30px 20px; text-align: center; }
.result-emoji { font-size: 64px; margin-bottom: 16px; }
.result-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; color: var(--green); }
.result-sub { font-size: 14px; color: var(--sub); margin-bottom: 28px; line-height: 1.6; }
.result-score { background: var(--surface); border-radius: var(--r); padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.result-score-num { font-size: 48px; font-weight: 800; color: var(--green); }
.result-score-label { font-size: 13px; color: var(--sub); }
.result-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
.result-btn.primary { background: var(--green); color: white; }
.result-btn.secondary { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }

/* 学習記録画面 */
#screen-record { display: none; padding: 0 0 30px; }
.record-wrap { padding: 20px; }
.record-section-title { font-size: 15px; font-weight: 800; margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
.record-item { background: var(--surface); padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.record-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.record-stats { font-size: 12px; color: var(--sub); }
.badge-weak { background: var(--red-l); color: var(--red); padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.badge-master { background: var(--green-l); color: var(--green); padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.badge-learning { background: var(--amber-l); color: var(--amber); padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; }

/* 図鑑マインドマップ画面 */
#screen-atlas { display: none; padding: 0 0 30px; }
.mindmap-toolbar { display: flex; gap: 8px; padding: 4px 16px 12px; }
.mindmap-toolbar button {
  flex: 1; padding: 9px; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--surface); font-size: 12px; font-weight: 700; color: var(--text); cursor: pointer;
}
.mindmap-toolbar button:hover { border-color: var(--green-m); background: var(--green-l); color: var(--green); }
#atlas-mindmap-wrap {
  overflow: auto; -webkit-overflow-scrolling: touch; margin: 0 0 0 0;
  background:
    linear-gradient(var(--bg) 0 0),
    repeating-linear-gradient(0deg, #00000008 0 1px, transparent 1px 24px),
    repeating-linear-gradient(90deg, #00000008 0 1px, transparent 1px 24px);
  height: calc(100vh - 210px); min-height: 320px; touch-action: pan-x pan-y;
}
#atlas-mindmap-canvas { position: relative; }
.mm-svg { position: absolute; left: 0; top: 0; pointer-events: none; }
.mm-svg path { fill: none; stroke: var(--green-m); stroke-width: 2; }
.mm-node {
  position: absolute; box-sizing: border-box; border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; padding: 0 10px;
  overflow: hidden; box-shadow: var(--shadow); border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text); line-height: 1.2; transition: border-color 0.15s;
}
.mm-node:active { border-color: var(--green); }
.mm-arrow { font-size: 9px; flex-shrink: 0; color: var(--green); }
.mm-label { font-size: 11.5px; font-weight: 700; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.mm-count { font-size: 9px; color: var(--sub); flex-shrink: 0; }
.mm-node.mm-d0 { background: var(--text); border-color: var(--text); }
.mm-node.mm-d0 .mm-label { color: white; font-size: 13px; }
.mm-node.mm-d1 { background: var(--green); border-color: var(--green); }
.mm-node.mm-d1 .mm-label { color: white; font-size: 12.5px; font-weight: 800; }
.mm-node.mm-d1 .mm-arrow, .mm-node.mm-d1 .mm-count { color: rgba(255,255,255,0.85); }
.mm-node.mm-d2 { background: var(--green-l); border-color: var(--green-m); }
.mm-node.mm-d3 { background: var(--surface); }
.mm-node.mm-leaf { background: var(--amber-l); border-color: #e6c87a; }
.mm-node.mm-leaf .mm-arrow { color: var(--amber); }

.category-plants-title { font-size: 15px; font-weight: 800; margin: 26px 0 12px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
.plant-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.plant-tile { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
.plant-tile-photo { width: 100%; aspect-ratio: 1; background: var(--green-l); display: flex; align-items: center; justify-content: center; }
.plant-tile-photo img { width: 100%; height: 100%; object-fit: cover; }
.plant-tile-name { padding: 8px 6px; text-align: center; font-size: 11.5px; font-weight: 700; color: var(--sub); cursor: pointer; line-height: 1.3; min-height: 34px; display: flex; align-items: center; justify-content: center; }
.plant-tile-name.revealed { color: var(--green); background: var(--green-l); }

/* 個別植物カード（暗記フラッシュカード） */
#screen-categorycard { display: none; padding: 0 0 30px; }
.plantcard-wrap { padding: 16px 20px; }
.plantcard-name { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.plantcard-sub { font-size: 12.5px; color: var(--sub); margin-bottom: 16px; }
.answer-card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px;
  margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow);
}
.answer-card.revealed { border-color: var(--green-m); }
.answer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; cursor: pointer; font-size: 14px; font-weight: 700;
}
.answer-toggle { font-size: 11.5px; color: var(--sub); font-weight: 400; }
.answer-body {
  padding: 0 16px 16px; font-size: 13.5px; line-height: 1.7; color: var(--red);
  font-weight: 700; border-top: 1px dashed var(--border); padding-top: 12px;
}

/* 演出用 */
.streak-popup { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--gold); color: white; border-radius: 24px; padding: 8px 20px; font-size: 15px; font-weight: 800; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; }
.streak-popup.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.levelup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
.levelup-overlay.show { display: flex; }
.levelup-box { background: var(--surface); border-radius: 24px; padding: 40px 32px; text-align: center; max-width: 300px; width: 90%; animation: popIn 0.4s ease; }
@keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.levelup-emoji { font-size: 64px; margin-bottom: 12px; }
.levelup-title { font-size: 24px; font-weight: 800; color: var(--green); margin-bottom: 8px; }
.levelup-desc { font-size: 14px; color: var(--sub); margin-bottom: 20px; }
.levelup-btn { width: 100%; padding: 13px; border-radius: 12px; border: none; background: var(--green); color: white; font-size: 15px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>🌿 植物マスター</h1>
  <div class="streak-badge" id="header-streak">🔥 0連続</div>
</header>

<div class="streak-popup" id="streak-popup"></div>
<div class="levelup-overlay" id="levelup-overlay">
  <div class="levelup-box">
    <div class="levelup-emoji" id="levelup-emoji">🎉</div>
    <div class="levelup-title" id="levelup-title">レベルアップ！</div>
    <div class="levelup-desc" id="levelup-desc"></div>
    <button class="levelup-btn" onclick="closeLevelup()">続ける！</button>
  </div>
</div>

<div id="screen-top">
  <div class="top-title">🌿 植物マスター</div>
  <div class="top-sub">garage green study app</div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-mastered">0</div>
      <div class="stat-label">マスター種</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-streak">0</div>
      <div class="stat-label">最高連続</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">総正解数</div>
    </div>
  </div>

  <button class="record-btn" onclick="showRecord()">📊 学習記録（植物図鑑）を見る</button>
  <button class="record-btn" onclick="showAtlas()">🌳 植物図鑑ツリーを見る</button>
  <div class="level-list" id="level-list"></div>
</div>

<div id="screen-game">
  <div class="game-header">
    <button class="back-btn" onclick="goTop()">←</button>
    <div class="game-title" id="game-title">Lv.1 名前を覚えよう</div>
    <div class="score-badge" id="score-badge">0 / 10</div>
  </div>
  <div class="game-progress"><div class="game-progress-fill" id="game-progress-fill" style="width:0%"></div></div>
  <div class="question-wrap">
    <div class="plant-photo" id="plant-photo"><div class="photo-placeholder">🌿</div></div>
    <div class="plant-name-hint" id="plant-name-hint" style="display:none"></div>
    
    <button id="search-hint-btn" style="width:100%; margin-bottom:14px; padding:10px; border-radius:12px; border:1px solid var(--green-m); background:var(--green-l); color:var(--green); font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;">🔍 Google画像検索でいろんな写真を見る</button>
    
    <div class="question-label">Q</div>
    <div class="question-text" id="question-text"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback">
      <div class="feedback-title" id="feedback-title"></div>
      <div class="feedback-desc" id="feedback-desc"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
  </div>
</div>

<div id="screen-result">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title"></div>
  <div class="result-sub" id="result-sub"></div>
  <div class="result-score"><div class="result-score-num" id="result-score-num"></div><div class="result-score-label" id="result-score-label"></div></div>
  <button class="result-btn primary" onclick="retrySession()">もう一度 🔄</button>
  <button class="result-btn secondary" onclick="goTop()">レベル選択に戻る</button>
</div>

<div id="screen-record">
  <div class="game-header">
    <button class="back-btn" onclick="goTop()">←</button>
    <div class="game-title">📊 学習記録（植物図鑑）</div>
  </div>
  <div class="record-wrap">
    <div id="record-master-area"></div>
    <div id="record-weak-area"></div>
    <div id="record-learning-area"></div>
    <div id="record-unstudied-area"></div>
  </div>
</div>

<div id="screen-atlas">
  <div class="game-header">
    <button class="back-btn" onclick="goTop()">←</button>
    <div class="game-title">🌳 植物図鑑マインドマップ</div>
  </div>
  <div class="mindmap-toolbar">
    <button onclick="mmCollapseAll()">全部閉じる</button>
    <button onclick="mmExpandLevel(2)">エリアまで展開</button>
  </div>
  <div id="atlas-mindmap-wrap">
    <div id="atlas-mindmap-canvas">読み込み中...</div>
  </div>
</div>

<div id="screen-categorycard">
  <div class="game-header">
    <button class="back-btn" onclick="goAtlasFromCard()">←</button>
    <div class="game-title">分類カード</div>
  </div>
  <div class="plantcard-wrap">
    <div class="plantcard-name" id="categorycard-name"></div>
    <div class="plantcard-sub" id="categorycard-sub"></div>
    <div id="categorycard-fields"></div>
    <div class="category-plants-title">🌿 この分類の植物</div>
    <div class="plant-grid" id="category-plant-grid"></div>
  </div>
</div>

<script>
const LEVELS = [
  { id: 1, name: '名前を覚えよう', icon: '📸', desc: '写真を見て植物名を答える', question: (p) => 'この植物の名前は？', answer: (p) => p['植物名（流通名）'], showName: false, wrongAnswers: (p, all) => shuffle(all.filter(x => x !== p)).slice(0,3).map(x => x['植物名（流通名）']), feedback: (p, correct) => correct ? `正解！${p['植物名（流通名）']}です。\n学名: ${p['学名'] || '—'}` : `正解は「${p['植物名（流通名）']}」でした。\n${p['機能性・効果'] || ''}`, },
  { id: 2, name: '置き場所・日照', icon: '☀️', desc: '植物の名前を見て日照・置き場所を答える', question: (p) => `「${p['植物名（流通名）']}」の日照条件は？`, answer: (p) => p['耐陰性（日照条件）'], showName: true, wrongAnswers: (p, all) => shuffle(all.filter(x => x['耐陰性（日照条件）'] !== p['耐陰性（日照条件）'] && x['耐陰性（日照条件）'])).slice(0,3).map(x => x['耐陰性（日照条件）']), feedback: (p, correct) => correct ? `正解！日照: ${p['耐陰性（日照条件）']}\n置き場所: ${p['推奨置き場所'] || '—'}` : `正解は「${p['耐陰性（日照条件）']}」\n置き場所: ${p['推奨置き場所'] || '—'}`, },
  { id: 3, name: '水やり・難易度', icon: '💧', desc: '水やり頻度と栽培難易度を答える', question: (p) => `「${p['植物名（流通名）']}」の水やりは？`, answer: (p) => p['水やりの頻度'], showName: true, wrongAnswers: (p, all) => shuffle(all.filter(x => x['水やりの頻度'] !== p['水やりの頻度'] && x['水やりの頻度'] && x['水やりの頻度'].length < 30)).slice(0,3).map(x => x['水やりの頻度']), feedback: (p, correct) => correct ? `正解！水やり: ${p['水やりの頻度']}\n難易度: ${p['栽培難易度'] || '—'}` : `正解は「${p['水やりの頻度']}」\n難易度: ${p['栽培難易度'] || '—'}`, },
  { id: 4, name: 'ギフト・安全性', icon: '🎁', desc: 'ギフト適性・ペット安全性を答える', question: (p) => `「${p['植物名（流通名）']}」はペット・子供に？`, answer: (p) => (p['ペット・子供への安全性'] || '').split('（')[0].trim() || p['ペット・子供への安全性'], showName: true, wrongAnswers: (p, all) => { const ans = (p['ペット・子供への安全性'] || '').split('（')[0].trim(); return shuffle(['安全', '注意が必要', '危険（毒性あり）'].filter(x => x !== ans)).slice(0,3); }, feedback: (p, correct) => correct ? `正解！${p['ペット・子供への安全性'] || '—'}\nギフト: ${p['ギフト適性'] || '—'}` : `正解: ${p['ペット・子供への安全性'] || '—'}\nギフト: ${p['ギフト適性'] || '—'}`, },

const QUESTIONS_PER_SESSION = 10;
const PASS_THRESHOLD = 7;

let allPlants = [];
let gameState = JSON.parse(localStorage.getItem('plant_game') || '{}');

if (!gameState.levelProgress) gameState.levelProgress = {};
if (!gameState.streak) gameState.streak = 0;
if (!gameState.bestStreak) gameState.bestStreak = 0;
if (!gameState.totalCorrect) gameState.totalCorrect = 0;
if (!gameState.plantStats) gameState.plantStats = {};

let currentLevel = null; let sessionPlants = []; let sessionIndex = 0; let sessionCorrect = 0; let currentStreak = 0; let answered = false;

async function loadCSV() {
  try {
    const res = await fetch('plants.csv');
    const text = await res.text();
    allPlants = parseCSV(text);
    renderTop();
  } catch(e) { console.error(e); alert('plants.csvが読み込めませんでした。'); }
}
function parseCSV(text) {
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const headers = parseCSVLine(lines[0]);
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseCSVLine(lines[i]);
    if (!vals[0]) continue;
    const obj = {}; headers.forEach((h, idx) => { if (h) obj[h] = vals[idx] || ''; });
    result.push(obj);
  }
  return result;
}
function parseCSVLine(line) {
  const result = []; let cur = ''; let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuote = !inQuote; }
    else if (c === ',' && !inQuote) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim()); return result;
}
function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

function renderTop() {
  document.getElementById('screen-top').style.display = 'block';
  document.getElementById('screen-game').style.display = 'none';
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-record').style.display = 'none';

  let masteredPlantsCount = 0;
  Object.values(gameState.plantStats).forEach(stat => {
    if (stat.correct >= 2 && (stat.correct / (stat.correct + stat.wrong)) >= 0.8) masteredPlantsCount++;
  });
  
  document.getElementById('stat-mastered').textContent = masteredPlantsCount;
  document.getElementById('stat-streak').textContent = gameState.bestStreak;
  document.getElementById('stat-total').textContent = gameState.totalCorrect;
  document.getElementById('header-streak').textContent = `🔥 ${currentStreak}連続`;

  const listEl = document.getElementById('level-list');
  listEl.innerHTML = LEVELS.map((lv, idx) => {
    const prog = gameState.levelProgress[lv.id] || {};
    const isLocked = idx > 0 && !(gameState.levelProgress[LEVELS[idx-1].id] || {}).cleared;
    const isCleared = prog.cleared;
    const isCurrent = !isLocked && !isCleared;
    const best = prog.bestScore || 0;
    const stars = best >= 10 ? '⭐⭐⭐' : best >= 8 ? '⭐⭐' : best >= PASS_THRESHOLD ? '⭐' : '';
    return `
      <div class="level-card ${isLocked ? 'locked' : ''} ${isCurrent ? 'current' : ''}" onclick="${isLocked ? '' : `startLevel(${lv.id})`}">

          ${isCleared ? `<div class="level-progress-wrap"><div class="level-progress" style="width:100%"></div></div>` : isCurrent && best > 0 ? `<div class="level-progress-wrap"><div class="level-progress" style="width:${best/10*100}%"></div></div>` : ''}
        </div>

function startLevel(levelId) {
  currentLevel = LEVELS.find(l => l.id === levelId);

function escapeHtml(str) { return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function selectAnswer(selected, correct, qIndex) {
  if (answered || qIndex !== sessionIndex) return; answered = true;
  const plant = sessionPlants[sessionIndex]; const isCorrect = selected === correct;
  
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true; const btnText = btn.textContent.replace(/^[A-D]\. /, '').trim();
    if (btnText === correct) btn.classList.add('correct');

  });

  const pName = plant['植物名（流通名）'];

    gameState.plantStats[pName].correct++;

          </a>
        `;

let atlasData = [];
let mindRoot = null;
let mindNodeSeq = 0;
const mindNodeMap = {};

const FIELD_DEFS = [
  { key: 'habitat',  icon: '🌍', label: '自生地' },
  { key: 'location', icon: '🏠', label: '屋外・屋内' },
  { key: 'light',    icon: '☀️', label: '日照' },
  { key: 'airflow',  icon: '💨', label: '風通し' },
  { key: 'temp',     icon: '🌡️', label: '温度' },
  { key: 'status',   icon: '🔄', label: '植物の状態' },
  { key: 'watering', icon: '💧', label: '水やり' },
];

async function loadAtlas() {
  try {
    const res = await fetch('atlas.json');
    atlasData = await res.json();
    mindRoot = buildMindTree(atlasData);
    renderMindmap();
  } catch (e) {
    console.error(e);
    document.getElementById('atlas-mindmap-canvas').innerHTML = '<p style="color:var(--sub);font-size:13px;padding:16px;">atlas.jsonが読み込めませんでした。</p>';
  }
}

function countPlants(catList) { return catList.reduce((s, c) => s + c.plants.length, 0); }

function newMindNode(depth, label, count, opts) {
  const node = Object.assign({ id: 'm' + (mindNodeSeq++), depth, label, count, expanded: false, children: [] }, opts || {});
  mindNodeMap[node.id] = node;
  return node;
}

function buildMindTree(data) {
  const allTop = data.flatMap(ag => ag.areaCodes.flatMap(ac => ac.groups.flatMap(g => g.categories)));
  const root = newMindNode(0, '🌿 植物図鑑', countPlants(allTop), { expanded: true });
  data.forEach(ag => {
    const agCats = ag.areaCodes.flatMap(ac => ac.groups.flatMap(g => g.categories));
    const agNode = newMindNode(1, ag.areaGroup, countPlants(agCats));
    ag.areaCodes.forEach(ac => {
      const acCats = ac.groups.flatMap(g => g.categories);
      const acNode = newMindNode(2, `${ac.areaCode}　${ac.title}`, countPlants(acCats));
      ac.groups.forEach(g => {
        const gNode = newMindNode(3, g.groupName, countPlants(g.categories));
        g.categories.forEach(c => {
          const cNode = newMindNode(4, c.name, c.plants.length, { isLeaf: true, code: c.code, children: null });
          gNode.children.push(cNode);
        });
        acNode.children.push(gNode);
      });
      agNode.children.push(acNode);
    });
    root.children.push(agNode);
  });
  return root;
}

const MM_COL_WIDTH = 186;
const MM_NODE_WIDTH = 168;
const MM_ROW_HEIGHT = 52;
const MM_NODE_HEIGHT = 44;

function mmLayout(node, depth, cursor) {
  node.depth = depth;
  node.x = depth * MM_COL_WIDTH + 16;
  if (cursor.maxDepth < depth) cursor.maxDepth = depth;
  if (!node.expanded || !node.children || node.children.length === 0) {
    node.y = cursor.y + MM_ROW_HEIGHT / 2;
    cursor.y += MM_ROW_HEIGHT;
  } else {
    node.children.forEach(child => mmLayout(child, depth + 1, cursor));
    const first = node.children[0].y;
    const last = node.children[node.children.length - 1].y;
    node.y = (first + last) / 2;
  }
}

function mmCollectVisible(node, list) {
  list.push(node);
  if (node.expanded && node.children) node.children.forEach(c => mmCollectVisible(c, list));
}

function renderMindmap() {
  if (!mindRoot) return;
  const cursor = { y: 16, maxDepth: 0 };
  mmLayout(mindRoot, 0, cursor);
  const totalHeight = Math.max(cursor.y + 16, 200);
  const totalWidth = (cursor.maxDepth + 1) * MM_COL_WIDTH + MM_NODE_WIDTH + 32;

  const visible = [];
  mmCollectVisible(mindRoot, visible);

  let paths = '';
  visible.forEach(node => {
    if (node.expanded && node.children) {
      node.children.forEach(child => {
        const px = node.x + MM_NODE_WIDTH, py = node.y;
        const cx = child.x, cy = child.y;
        const mx = (px + cx) / 2;
        paths += `<path d="M${px},${py} C${mx},${py} ${mx},${cy} ${cx},${cy}"/>`;
      });
    }
  });

  let nodesHtml = '';
  visible.forEach(node => {
    const depthClass = node.depth === 0 ? 'mm-d0' : node.depth === 1 ? 'mm-d1' : node.depth === 2 ? 'mm-d2' : 'mm-d3';
    const leafClass = node.isLeaf ? ' mm-leaf' : '';
    const hasChildren = node.children && node.children.length > 0;
    const arrow = node.isLeaf ? '🌿' : (hasChildren ? (node.expanded ? '▼' : '▶') : '・');
    const onclick = node.isLeaf ? `openCategoryCard('${node.code}')` : (hasChildren ? `mmToggle('${node.id}')` : '');
    const h = node.depth === 0 ? 40 : MM_NODE_HEIGHT;
    nodesHtml += `
      <div class="mm-node ${depthClass}${leafClass}" style="left:${node.x}px; top:${node.y - h / 2}px; width:${MM_NODE_WIDTH}px; height:${h}px;" onclick="${onclick}">
        <span class="mm-arrow">${arrow}</span>
        <span class="mm-label">${node.label}</span>
        <span class="mm-count">${node.count}</span>
      </div>`;
  });

  const canvas = document.getElementById('atlas-mindmap-canvas');
  canvas.style.width = totalWidth + 'px';
  canvas.style.height = totalHeight + 'px';
  canvas.innerHTML = `<svg class="mm-svg" width="${totalWidth}" height="${totalHeight}">${paths}</svg>${nodesHtml}`;
}

function mmToggle(id) {
  const node = mindNodeMap[id];
  if (!node) return;
  node.expanded = !node.expanded;
  renderMindmap();
}

function mmCollapseAll() {
  Object.values(mindNodeMap).forEach(n => { if (n.depth > 0) n.expanded = false; });
  renderMindmap();
}

function mmExpandLevel(depth) {
  Object.values(mindNodeMap).forEach(n => { if (n.depth < depth) n.expanded = true; });
  renderMindmap();
}

function showAtlas() {
  document.getElementById('screen-top').style.display = 'none';
  document.getElementById('screen-atlas').style.display = 'block';
  if (atlasData.length === 0) loadAtlas();
}

function findCategoryByCode(code) {
  for (const ag of atlasData) for (const ac of ag.areaCodes) for (const g of ac.groups) for (const c of g.categories) if (c.code === code) return c;
  return null;
}

function findCategoryContext(code) {
  for (const ag of atlasData) for (const ac of ag.areaCodes) for (const g of ac.groups) for (const c of g.categories)
    if (c.code === code) return { areaGroup: ag.areaGroup, areaCodeTitle: ac.title, groupName: g.groupName, cat: c };
  return null;
}

let categoryCardPlants = [];

function openCategoryCard(catCode) {
  const ctx = findCategoryContext(catCode);
  if (!ctx) return;
  const cat = ctx.cat;
  categoryCardPlants = cat.plants;

  document.getElementById('screen-atlas').style.display = 'none';
  document.getElementById('screen-categorycard').style.display = 'block';
  document.getElementById('categorycard-name').textContent = cat.name;
  document.getElementById('categorycard-sub').textContent = `${ctx.groupName} ・ ${ctx.areaCodeTitle}`;

  document.getElementById('categorycard-fields').innerHTML = FIELD_DEFS.map((f, i) => `
    <div class="answer-card" id="ans-${i}">
      <div class="answer-header" onclick="toggleAnswer(${i})">
        <span>${f.icon} ${f.label}</span>
        <span class="answer-toggle" id="ans-${i}-toggle">タップして表示</span>
      </div>
      <div class="answer-body" id="ans-${i}-body" style="display:none">${escapeAnswerText(cat[f.key])}</div>
    </div>
  `).join('');

  document.getElementById('category-plant-grid').innerHTML = cat.plants.map((p, i) => {
    const safeName = p.name.replace(/\//g, '／');
    return `
      <div class="plant-tile">
        <div class="plant-tile-photo">
          <img src="images/${safeName}.jpg" alt="植物の写真" loading="lazy"
               onerror="if(!this.dataset.retried){this.dataset.retried='true'; this.src='images/${safeName.normalize('NFD')}.jpg';}else{this.parentNode.innerHTML='<div style=\\'font-size:26px;\\'>🌿</div>';}"
               style="width:100%;height:100%;object-fit:cover;">
        </div>
        <div class="plant-tile-name" id="pt-${i}-name" onclick="togglePlantName(${i})">タップして名前を表示</div>
      </div>`;
  }).join('');
}

function togglePlantName(i) {
  const el = document.getElementById(`pt-${i}-name`);
  const isRevealed = el.classList.contains('revealed');
  if (isRevealed) {
    el.textContent = 'タップして名前を表示';
    el.classList.remove('revealed');
  } else {
    el.textContent = `${categoryCardPlants[i].no} ${categoryCardPlants[i].name}`;
    el.classList.add('revealed');
  }
}

function escapeAnswerText(str) { return (str || '—').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>'); }

function toggleAnswer(i) {
  const body = document.getElementById(`ans-${i}-body`);
  const toggle = document.getElementById(`ans-${i}-toggle`);
  const card = document.getElementById(`ans-${i}`);
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  toggle.textContent = isOpen ? 'タップして表示' : '';
  card.classList.toggle('revealed', !isOpen);
}

function goAtlasFromCard() {
  document.getElementById('screen-categorycard').style.display = 'none';
  document.getElementById('screen-atlas').style.display = 'block';
}

loadCSV();
loadAtlas();
</script>
